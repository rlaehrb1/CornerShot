<svg xmlns="http://www.w3.org/2000/svg" width="900" height="620" viewBox="0 0 900 620">
  <rect width="900" height="620" rx="16" fill="#f5f5f7"/>
  <text x="44" y="62" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="30" font-weight="700" fill="#1d1d1f">CornerShot Hot Corners</text>
  <text x="44" y="94" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="15" fill="#6e6e73">Choose one action for each corner. macOS hot-corner conflicts are shown in red.</text>

  <rect x="58" y="132" width="784" height="370" rx="18" fill="#ffffff" stroke="#d2d2d7"/>
  <rect x="210" y="205" width="480" height="225" rx="22" fill="#f2f2f4" stroke="#c7c7cc" stroke-width="2"/>
  <text x="450" y="323" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#8e8e93">Screen</text>

  <g>
    <rect x="88" y="160" width="270" height="128" rx="12" fill="#ffffff" stroke="#d2d2d7"/>
    <text x="108" y="190" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#1d1d1f">Top Left</text>
    <rect x="108" y="205" width="230" height="30" rx="7" fill="#f5f5f7" stroke="#c7c7cc"/>
    <text x="122" y="225" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="13" fill="#1d1d1f">Show Clipboard Window</text>
    <text x="108" y="259" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="12" fill="#6e6e73">macOS: None</text>
  </g>

  <g>
    <rect x="542" y="160" width="270" height="128" rx="12" fill="#ffffff" stroke="#d2d2d7"/>
    <text x="562" y="190" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#1d1d1f">Top Right</text>
    <rect x="562" y="205" width="230" height="30" rx="7" fill="#f5f5f7" stroke="#c7c7cc"/>
    <text x="576" y="225" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="13" fill="#1d1d1f">None</text>
    <text x="562" y="259" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="12" fill="#6e6e73">macOS: Command Lock Screen</text>
  </g>

  <g>
    <rect x="88" y="346" width="270" height="128" rx="12" fill="#ffffff" stroke="#d2d2d7"/>
    <text x="108" y="376" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#1d1d1f">Bottom Left</text>
    <rect x="108" y="391" width="230" height="30" rx="7" fill="#f5f5f7" stroke="#c7c7cc"/>
    <text x="122" y="411" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="13" fill="#1d1d1f">Screenshot: Selected Area</text>
    <text x="108" y="445" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="12" fill="#6e6e73">macOS: None</text>
  </g>

  <g>
    <rect x="542" y="346" width="270" height="128" rx="12" fill="#fff8f7" stroke="#ff3b30" stroke-width="2"/>
    <text x="562" y="376" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#1d1d1f">Bottom Right</text>
    <rect x="562" y="391" width="230" height="30" rx="7" fill="#ffffff" stroke="#c7c7cc"/>
    <text x="576" y="411" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="13" fill="#1d1d1f">Show Clipboard Window</text>
    <text x="562" y="445" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="12" fill="#d70015">macOS: Desktop - conflict</text>
  </g>

  <text x="58" y="538" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="13" fill="#6e6e73">CornerShot choices remain editable. A red corner is saved but will not run until the macOS corner is cleared.</text>
  <rect x="566" y="554" width="164" height="36" rx="9" fill="#ffffff" stroke="#c7c7cc"/>
  <text x="648" y="577" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="14" fill="#1d1d1f">Refresh macOS</text>
  <rect x="746" y="554" width="96" height="36" rx="9" fill="#007aff"/>
  <text x="794" y="577" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="14" fill="#ffffff">Done</text>
</svg>
